<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TD - SIHM</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        
        .header-top {
            background-color: #1e5ba8;
            color: white;
            padding: 15px 20px;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
        }
        
        .header-top a {
            color: white;
            text-decoration: underline;
            cursor: pointer;
            margin-left: 10px;
        }
        
        .header-top a:hover {
            text-decoration: none;
        }
        
        .container-main {
            display: flex;
            min-height: calc(100vh - 100px);
        }
        
        .sidebar {
            background-color: #f5f5f5;
            padding: 20px;
            width: 300px;
            border-right: 1px solid #ddd;
        }
        
        .sidebar h3 {
            color: #333;
            font-size: 18px;
            margin-top: 0;
            margin-bottom: 20px;
        }
        
        .sidebar-menu {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .sidebar-menu li {
            margin-bottom: 10px;
        }
        
        .sidebar-menu a {
            color: #1e5ba8;
            text-decoration: none;
            font-weight: bold;
            font-size: 15px;
            display: block;
            padding: 8px 10px;
            border-radius: 4px;
            transition: background-color 0.3s;
        }
        
        .sidebar-menu a:hover {
            background-color: #e8f0f7;
        }
        
        .content {
            flex: 1;
            padding: 30px;
            background-color: #fff;
        }
        
        .content h2 {
            color: #333;
            margin-top: 0;
        }
        
        .content p {
            color: #666;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <!-- Header Top -->
    <div class="header-top">
        TD - SIHM - ETU000XXX | <a href="#">Changer Caisse</a>
    </div>
    
    <!-- Main Container -->
    <div class="container-main">
        <!-- Sidebar -->
        <div class="sidebar">
            <h3>Caisse n°X</h3>
            <ul class="sidebar-menu">
                <li><a href="#menu1">Menu 1</a></li>
                <li><a href="#menu2">Menu 2</a></li>
                <li><a href="#menu3">Menu 3</a></li>
            </ul>
        </div>
        
        <!-- Content Area -->
        <div class="content">
            <h2>Contenu</h2>
            <p>Ici le contenu de la caisse...</p>
        </div>
    </div>
